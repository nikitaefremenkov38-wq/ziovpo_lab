services:
  postgres:
    image: postgres:16-alpine
    container_name: securitydb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-securitydb}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - securitydb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-securitydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  securitydb_data:
