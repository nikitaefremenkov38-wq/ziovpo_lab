spring.application.name=demo
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/parkdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:always}

security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-32}
security.jwt.access-token-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:15}
security.jwt.refresh-token-ttl-minutes=${JWT_REFRESH_TTL_MINUTES:10080}
security.admin.email=${ADMIN_EMAIL:}
security.admin.password=${ADMIN_PASSWORD:}

server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE:}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SSL_KEY_ALIAS:}
