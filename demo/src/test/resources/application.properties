spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never
security.jwt.secret=test-secret-test-secret-test-secret-1234
security.jwt.access-token-ttl-minutes=15
security.jwt.refresh-token-ttl-minutes=60
security.admin.email=admin@test.local
security.admin.password=admin
server.ssl.enabled=false
